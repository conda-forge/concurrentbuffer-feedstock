{% set name = "concurrentbuffer" %}
{% set version = "0.0.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/concurrentbuffer-{{ version }}.tar.gz
  sha256: 1e036a1ba3a01f4cfc842e4a06bc4c8ca3d392b70e064bfced82de95b2f3fe8c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0.0
    - wheel >=0.33.4
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.18.1

test:
  imports:
    - concurrentbuffer
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  license: MIT
  license_file: LICENSE
  home: https://pypi.org/project/concurrentbuffer/
  summary: This package aims to be a general solution for a concurrent buffer, .i.e., a buffer filled with data using parallel running 'producer' processes

extra:
  recipe-maintainers:
    - sarthakpati
